<!DOCTYPE html>
<html>
<head>
    <title>ASAAN QIST MANAGEMENT SYSTEM</title>

    <style>
        body { font-family: Arial; background:#f4f4f4; padding:20px; }
        h1 { text-align:center; }

        .container {
            background:#e8e8e8;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        input, button { padding:8px; margin:5px; width:220px; }

        button { border:none; cursor:pointer; padding:6px 10px; color:white; }
        .addBtn{background:#28a745;}
        .payBtn{background:#007bff;}
        .pdfBtn{background:#6f42c1;}
        .deleteBtn{background:#dc3545;}

        button:hover{opacity:0.9;}

        .invoiceBox{
            background:white;
            border:1px solid #ccc;
            padding:20px;
            margin-bottom:20px;
            border-radius:8px;
        }

        .invoiceTitle{
            text-align:center;
            background:#333;
            color:white;
            padding:8px;
            margin:-20px -20px 15px -20px;
        }

        .invoiceRow{ margin:6px 0; }
        hr{ margin:10px 0; }
    </style>

    <!-- jsPDF + AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<h1>ASAAN QIST MANAGEMENT SYSTEM</h1>

<div class="container">

    <h3>Add Client</h3>

    <!-- Client Details -->
    <input type="text" id="name" placeholder="Client Name">
    <input type="text" id="cnic" placeholder="Client CNIC">
    <input type="text" id="phone" placeholder="Client Phone Number">
    <input type="text" id="address" placeholder="Client Address"><br>

    <!-- Guarantor Details -->
    <input type="text" id="guarantorName" placeholder="Guarantor Name">
    <input type="text" id="guarantorCNIC" placeholder="Guarantor CNIC"><br>

    <!-- Payment Details -->
    <input type="number" id="total" placeholder="Product Price">
    <input type="number" id="percent" placeholder="Profit %">
    <input type="number" id="months" placeholder="Number of Installments"><br>

    <button class="addBtn" onclick="addClient()">Add Client</button>

    <div id="clientTable"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, collection, addDoc, getDocs,
    deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDYhKRYtdLRfB0Dhn1uXd8l2EoJJzWtmvY",
    authDomain: "asan-qist-system.firebaseapp.com",
    projectId: "asan-qist-system",
    storageBucket: "asan-qist-system.firebasestorage.app",
    messagingSenderId: "123694106584",
    appId: "1:123694106584:web:53a472ed4f076293b2d4ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clients = [];

// Load clients from Firestore
async function loadClients(){
    const snapshot = await getDocs(collection(db,"clients"));
    clients = [];
    snapshot.forEach(docSnap=>{
        clients.push({ id: docSnap.id, ...docSnap.data() });
    });
    clients.reverse();
    displayClients();
}
loadClients();

// Function to ask for access code
function askCode(){
    let code = prompt("Enter access code to proceed:");
    if(code === "AQali"){
        return true;
    } else {
        alert("Access Denied! Incorrect Code.");
        return false;
    }
}

// Add client (restricted)
window.addClient = async function(){
    if(!askCode()) return;

    let name = document.getElementById("name").value.trim();
    let cnic = document.getElementById("cnic").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();
    let guarantorName = document.getElementById("guarantorName").value.trim();
    let guarantorCNIC = document.getElementById("guarantorCNIC").value.trim();
   
    let total = parseFloat(document.getElementById("total").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let months = parseInt(document.getElementById("months").value);

    if(!name || !cnic || !phone || !address || !guarantorName || !guarantorCNIC ||  isNaN(total) || isNaN(percent) || isNaN(months)){
        alert("Fill all fields correctly");
        return;
    }

    let profitAmount = total * (percent/100);
    let finalAmount = total + profitAmount;
    let monthly = finalAmount / months;

    await addDoc(collection(db,"clients"),{
        name, cnic, phone, address,
        guarantorName, guarantorCNIC,
        total, profitPercent: percent, profitAmount, finalAmount, months, monthly,
        paid:0,
        installments:[]
    });

    loadClients();
}

// Delete client (restricted)
window.deleteClient = async function(index){
    if(!askCode()) return;
    await deleteDoc(doc(db,"clients",clients[index].id));
    loadClients();
}

// Add payment (restricted)
window.addPayment = async function(index){
    if(!askCode()) return;

    let amount = parseFloat(prompt("Enter payment amount:"));
    if(isNaN(amount) || amount<=0) return;

    let client = clients[index];
    let newPaid = (client.paid || 0) + amount;

    let newInstallments = client.installments || [];
    newInstallments.push({
        date: new Date().toLocaleDateString(),
        amount: amount
    });

    await updateDoc(doc(db,"clients",client.id),{
        paid:newPaid,
        installments:newInstallments
    });

    loadClients();
}

// Display clients
window.displayClients = function(){

    let container = document.getElementById("clientTable");
    container.innerHTML="";

    clients.forEach((c,index)=>{

        let serial = index + 1;

        container.innerHTML += `
        <div class="invoiceBox">
            <div class="invoiceTitle">
                CLIENT INVOICE #${serial}
            </div>
<div class="invoiceRow"><b>Client CNIC:</b> ${c.name}</div>
            <div class="invoiceRow"><b>Client CNIC:</b> ${c.cnic}</div>
            <div class="invoiceRow"><b>Client Phone:</b> ${c.phone}</div>
            <div class="invoiceRow"><b>Client Address:</b> ${c.address}</div>
            <div class="invoiceRow"><b>Guarantor Name:</b> ${c.guarantorName}</div>
            <div class="invoiceRow"><b>Guarantor CNIC:</b> ${c.guarantorCNIC}</div>
          
            <div class="invoiceRow"><b>Final Amount:</b> ${c.finalAmount}</div>
            <div class="invoiceRow"><b>Installments:</b> ${c.months} (Amount per installment: ${c.monthly.toFixed(2)})</div>
            <div class="invoiceRow"><b>Total Paid:</b> ${c.paid || 0}</div>
            <div class="invoiceRow"><b>Remaining:</b> ${(c.finalAmount - (c.paid || 0)).toFixed(2)}</div>

            <hr>

            <button class="payBtn" onclick="addPayment(${index})">Pay</button>
            <button class="pdfBtn" onclick="generatePDF(${index})">PDF</button>
            <button class="deleteBtn" onclick="deleteClient(${index})">Delete</button>
        </div>
        `;
    });
}

// Generate PDF (open for everyone)
window.generatePDF = function(index){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    let c = clients[index];
    let serial = index + 1;

    doc.setFontSize(40);
    doc.setTextColor(150,150,150);
    doc.text('ASAAN QIST', 60, 90);
    doc.setTextColor(0,0,0);
    doc.setFontSize(16);

    doc.text(`CLIENT INVOICE #${serial}`, 20, 20);
    doc.setFontSize(12);
    doc.text(`Client CNIC: ${c.name}`, 20, 30);
    doc.text(`Client CNIC: ${c.cnic}`, 20, 30);
    doc.text(`Client Phone: ${c.phone}`, 20, 37);
    doc.text(`Client Address: ${c.address}`, 20, 44);
    doc.text(`Guarantor Name: ${c.guarantorName}`, 20, 51);
    doc.text(`Guarantor CNIC: ${c.guarantorCNIC}`, 20, 58);
    
    doc.text(`Final Amount: ${c.finalAmount}`, 20, 72);
    doc.text(`Installments: ${c.months} (Per Installment: ${c.monthly.toFixed(2)})`, 20, 79);
    doc.text(`Total Paid: ${c.paid || 0}`, 20, 86);
    doc.text(`Remaining: ${(c.finalAmount - (c.paid || 0)).toFixed(2)}`, 20, 93);

    let installmentRows = [];
    if(c.installments && c.installments.length > 0){
        c.installments.forEach((inst,i)=>{
            installmentRows.push([i+1, inst.date, inst.amount]);
        });
    } else {
        installmentRows.push(["-", "No Payments Yet", "-"]);
    }

    doc.autoTable({
        startY: 105,
        head: [['#', 'Payment Date', 'Amount']],
        body: installmentRows
    });

    let pdfBlob = doc.output('bloburl');
    window.open(pdfBlob);
}

</script>

</body>
</html>
